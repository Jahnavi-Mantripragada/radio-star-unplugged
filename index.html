<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Star | Unplugged</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .studio-container { max-width: 600px; margin: 0 auto; }
        video { width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toggle-btn { width: 100%; padding: 20px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; background: #1DB954; color: white; font-size: 1.1rem; margin-top: 20px; }
        .note { color: #b3b3b3; font-size: 0.9rem; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>
    <div class="studio-container">
        <h2 style="color: #1DB954;">THE SINGER'S BOOTH</h2>
        <p style="margin-bottom: 20px;">Year 9 | US Sessions</p>

        <!-- Single Video Player -->
        <video id="booth-player" controls playsinline>
            <source id="video-source" src="practice.mp4" type="video/mp4">
        </video>

        <button id="toggle-btn" onclick="toggleMode()">🎤 MODE: PRACTICE (INSTRUMENTAL)</button>
        
        <p class="note">Switch modes to hear the original vocals for reference.</p>
    </div>

    <script>
        const video = document.getElementById('booth-player');
        const source = document.getElementById('video-source');
        const btn = document.getElementById('toggle-btn');
        let isPractice = true;

        function toggleMode() {
            const currentTime = video.currentTime;
            const wasPaused = video.paused;

            isPractice = !isPractice;
            source.src = isPractice ? "practice.mp4" : "original.mp4";
            
            btn.innerHTML = isPractice ? "🎤 MODE: PRACTICE (INSTRUMENTAL)" : "🎧 MODE: LISTEN (ORIGINAL)";
            btn.style.background = isPractice ? "#1DB954" : "#535353";

            video.load();
            video.currentTime = currentTime;
            if (!wasPaused) video.play();
        }
    </script>
</body>
</html>
