<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Star | The US Sessions</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 10px; }
        audio { width: 100%; filter: invert(100%); margin: 20px 0; }
        #toggle-btn { width: 100%; padding: 20px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; background: #1DB954; color: white; font-size: 1.1rem; }
        .telugu { font-size: 1.8rem; margin-top: 40px; font-weight: bold; line-height: 1.6; }
        .eng { color: #b3b3b3; margin-bottom: 40px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <h1>THE SINGER'S BOOTH</h1>
    
    <div class="video-container">
        <iframe id="vidal" src="https://www.youtube.com/embed/XbAuO8hYoxo?autoplay=1&mute=1&playlist=XbAuO8hYoxo&loop=1" frameborder="0"></iframe>
    </div>

    <audio id="player" controls><source id="source" src="assets/instrumental.mp3" type="audio/mpeg"></audio>
    
    <button id="toggle-btn" onclick="toggle()">🎤 MODE: PRACTICE (INSTRUMENTAL)</button>

    <div class="lyrics">
        <p class="telugu">ఇట్స్ యువర్ లవ్.. ఇట్స్ యువర్ లవ్..</p>
        <p class="eng">It's your love.. it's your love..</p>
        
        <p class="telugu">నన్నిలా.. నన్నిలా.. మార్చింది..</p>
        <p class="eng">Nannila.. nannila.. maarchindhi..</p>

        <p class="telugu">మౌనమే.. పాటగా.. మార్చింది..</p>
        <p class="eng">Mouname.. paataga.. maarchindhi..</p>
    </div>

    <script>
        let isInst = true;
        const p = document.getElementById('player');
        const s = document.getElementById('source');
        const b = document.getElementById('toggle-btn');

        function toggle() {
            const time = p.currentTime;
            const paused = p.paused;
            s.src = isInst ? "assets/original.mp3" : "assets/instrumental.mp3";
            b.innerHTML = isInst ? "🎧 MODE: LISTEN (ORIGINAL)" : "🎤 MODE: PRACTICE (INSTRUMENTAL)";
            b.style.background = isInst ? "#535353" : "#1DB954";
            p.load();
            p.currentTime = time;
            if (!paused) p.play();
            isInst = !isInst;
        }
    </script>
</body>
</html>
