<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Star | The US Sessions</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        audio { width: 100%; filter: invert(100%); margin: 20px 0; }
        #toggle-btn { width: 100%; padding: 20px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; background: #1DB954; color: white; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(29, 185, 84, 0.3); }
        .note { color: #b3b3b3; font-size: 0.9rem; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 5px;">THE SINGER'S BOOTH</h2>
    <p style="color: #1DB954; margin-bottom: 20px; letter-spacing: 1px;">YEAR 9 | US SESSIONS</p>
    
    <div class="video-container">
        <!-- This embeds your specific YouTube link, muted and looping -->
        <iframe src="https://www.youtube.com/embed/XbAuO8hYoxo?autoplay=1&mute=1&playlist=XbAuO8hYoxo&loop=1" frameborder="0"></iframe>
    </div>

    <audio id="player" controls><source id="source" src="assets/instrumental.mp3" type="audio/mpeg"></audio>
    
    <button id="toggle-btn" onclick="toggle()">🎤 MODE: PRACTICE (INSTRUMENTAL)</button>

    <p class="note">The video lyrics are synced to the track. Use the toggle to switch between listening and practice mode.</p>

    <script>
        let isInst = true;
        const p = document.getElementById('player');
        const s = document.getElementById('source');
        const b = document.getElementById('toggle-btn');

        function toggle() {
            const time = p.currentTime;
            const paused = p.paused;
            s.src = isInst ? "assets/original.mp3" : "assets/instrumental.mp3";
            b.innerHTML = isInst ? "🎧 MODE: LISTEN (ORIGINAL)" : "🎤 MODE: PRACTICE (INSTRUMENTAL)";
            b.style.background = isInst ? "#535353" : "#1DB954";
            p.load();
            p.currentTime = time;
            if (!paused) p.play();
            isInst = !isInst;
        }
    </script>
</body>
</html>
